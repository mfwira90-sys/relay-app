<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relay Super App</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        :root { --soft-orange: #FF9800; --soft-grey: #F5F5F5; --white: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--soft-grey); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Layout */
        header { background: var(--soft-orange); color: white; padding: 12px 20px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .view { display: none; flex: 1; overflow-y: auto; padding: 20px; flex-direction: column; }
        .view.active { display: flex; }

        /* Chat Styling */
        #chat-view { padding-bottom: 140px; gap: 15px; }
        .msg-container { display: flex; align-items: flex-end; gap: 8px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: #ddd; flex-shrink: 0; }
        .msg { padding: 12px 16px; border-radius: 18px 18px 18px 4px; max-width: 75%; background: var(--white); border: 1px solid #eee; font-size: 15px; }

        /* Profile Styling */
        .profile-card { background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; background: var(--soft-orange); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; }

        /* Controls */
        .input-area { background: var(--white); padding: 12px 15px; display: flex; gap: 10px; border-top: 1px solid #eee; position: fixed; bottom: 65px; width: 100%; box-sizing: border-box; }
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #e0e0e0; outline: none; font-size: 15px; }
        
        nav { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); height: 65px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; position: fixed; bottom: 0; width: 100%; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #999; cursor: pointer; border: none; background: none; }
        .nav-item.active { color: var(--soft-orange); }

        #video-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        .end-call { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); background: #ff3b30; color: white; padding: 15px 40px; border-radius: 35px; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div>Relay</div>
        <button id="call-btn" style="background:rgba(255,255,255,0.2); border:none; color:white; padding: 6px 12px; border-radius: 12px; font-size: 0.8rem;">📞 CALL</button>
    </header>

    <div id="video-container"><button class="end-call" id="end-btn">End Call</button></div>

    <div id="chat-view" class="view active">
        <div class="msg-container">
            <div class="avatar" style="background: var(--soft-orange);"></div>
            <div class="msg">Welcome to Relay! Switch tabs below to see your profile.</div>
        </div>
    </div>

    <div id="calls-view" class="view">
        <h3 style="color: #666;">Recent Calls</h3>
        <p style="color: #999; text-align: center; margin-top: 50px;">No recent call history.</p>
    </div>

    <div id="account-view" class="view">
        <div class="profile-card">
            <div class="profile-img">👤</div>
            <h2 style="margin: 0;">User</h2>
            <p style="color: #888;">relay-user-12345</p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <button style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; background: none;">Edit Profile</button>
        </div>
    </div>

    <div class="input-area" id="msg-input-bar">
        <input type="text" id="in" placeholder="Message Relay...">
        <button id="send-btn" style="border:none; background:var(--soft-orange); color:white; width:45px; height:45px; border-radius:50%;">➤</button>
    </div>

    <nav>
        <button class="nav-item active" onclick="showView('chat-view', this)"><span>💬</span><small>Chats</small></button>
        <button class="nav-item" onclick="showView('calls-view', this)"><span>📞</span><small>Calls</small></button>
        <button class="nav-item" onclick="showView('account-view', this)"><span>👤</span><small>Account</small></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDC1a-bGXLrA8SqWPE4LTGlNNWb9PXql04",
            authDomain: "gen-lang-client-0720380653.firebaseapp.com",
            databaseURL: "https://gen-lang-client-0720380653-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "gen-lang-client-0720380653",
            storageBucket: "gen-lang-client-0720380653.firebasestorage.app",
            messagingSenderId: "128069738880",
            appId: "1:128069738880:web:60a8f36bf359ebf9e06165"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");

        // View Switching Logic
        window.showView = (viewId, btn) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            btn.classList.add('active');
            
            // Hide input bar if not in chat
            document.getElementById('msg-input-bar').style.display = (viewId === 'chat-view') ? 'flex' : 'none';
        };

        const sendMsg = () => {
            const val = document.getElementById('in').value;
            if(val) { push(chatRef, { text: val }); document.getElementById('in').value = ""; }
        };
        document.getElementById('send-btn').onclick = sendMsg;

        onChildAdded(chatRef, (s) => {
            const container = document.createElement('div');
            container.className = 'msg-container';
            container.innerHTML = `<div class="avatar"></div><div class="msg">${s.val().text}</div>`;
            document.getElementById('chat-view').appendChild(container);
            document.getElementById('chat-view').scrollTop = document.getElementById('chat-view').scrollHeight;
        });

        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        document.getElementById('call-btn').onclick = async () => {
            document.getElementById('video-container').style.display = "block";
            await client.join("cf58cde3ad4b45b29b65dc4e01b92ae1", "relay-room", null);
            const localTrack = await AgoraRTC.createCameraVideoTrack();
            localTrack.play('video-container');
            await client.publish([localTrack]);
        };
        document.getElementById('end-btn').onclick = () => { location.reload(); };
    </script>
</body>
</html>
