<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relay Super App</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        :root { --soft-orange: #FF9800; --soft-grey: #F5F5F5; --dark-grey: #333; }
        body { font-family: -apple-system, sans-serif; background: var(--soft-grey); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        header { background: var(--soft-orange); color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Chat Area */
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 80px; }
        .msg { padding: 12px; border-radius: 18px; max-width: 80%; background: white; border: 1px solid #eee; font-size: 14px; line-height: 1.4; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        
        /* Input Area */
        .input-area { background: white; padding: 10px 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; position: fixed; bottom: 60px; width: 100%; box-sizing: border-box; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; background: #fafafa; }
        
        /* Bottom Nav */
        nav { background: white; height: 60px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; position: fixed; bottom: 0; width: 100%; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #888; text-decoration: none; }
        .nav-item.active { color: var(--soft-orange); }

        /* Video Container */
        #video-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; }
        .end-call { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: #ff4444; color: white; padding: 15px 40px; border-radius: 30px; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <span>Relay</span>
        <button id="call-btn" style="background:none; border:none; color:white; font-size:1.4rem;">📞</button>
    </header>

    <div id="video-container"><button class="end-call" id="end-btn">End Call</button></div>

    <div id="chat">
        <div class="msg">Welcome to Relay! Send a message or try a video call.</div>
    </div>

    <div class="input-area">
        <input type="text" id="in" placeholder="Type a message...">
        <button id="send-btn" style="border:none; background:none; font-size:1.5rem;">➤</button>
    </div>

    <nav>
        <div class="nav-item active"><span>💬</span><span>Chat</span></div>
        <div class="nav-item"><span>📞</span><span>Calls</span></div>
        <div class="nav-item"><span>👤</span><span>Profile</span></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDC1a-bGXLrA8SqWPE4LTGlNNWb9PXql04",
            authDomain: "gen-lang-client-0720380653.firebaseapp.com",
            databaseURL: "https://gen-lang-client-0720380653-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "gen-lang-client-0720380653",
            storageBucket: "gen-lang-client-0720380653.firebasestorage.app",
            messagingSenderId: "128069738880",
            appId: "1:128069738880:web:60a8f36bf359ebf9e06165"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");

        // Chat functionality
        const sendMsg = () => {
            const val = document.getElementById('in').value;
            if(val) { push(chatRef, { text: val }); document.getElementById('in').value = ""; }
        };
        document.getElementById('send-btn').onclick = sendMsg;
        document.getElementById('in').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });

        onChildAdded(chatRef, (s) => {
            const m = document.createElement('div'); m.className = 'msg';
            m.innerText = s.val().text; document.getElementById('chat').appendChild(m);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        });

        // Video functionality
        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        document.getElementById('call-btn').onclick = async () => {
            document.getElementById('video-container').style.display = "block";
            await client.join("cf58cde3ad4b45b29b65dc4e01b92ae1", "relay-room", null);
            const localTrack = await AgoraRTC.createCameraVideoTrack();
            localTrack.play('video-container');
            await client.publish([localTrack]);
        };
        document.getElementById('end-btn').onclick = () => { location.reload(); };
    </script>
</body>
</html>
