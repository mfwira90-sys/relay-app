<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relay Super App</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        :root { --soft-orange: #FF9800; --soft-grey: #F5F5F5; --white: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--soft-grey); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Fixed Header */
        header { background: var(--soft-orange); color: white; padding: 15px 20px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Screens */
        .screen { display: none; flex: 1; overflow-y: auto; padding: 20px; flex-direction: column; }
        .screen.active { display: flex; }

        /* Chat UI */
        #chat-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 150px; }
        .msg-row { display: flex; align-items: flex-end; gap: 8px; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: #ddd; flex-shrink: 0; }
        .msg-bubble { padding: 12px 16px; border-radius: 18px 18px 18px 4px; max-width: 70%; background: var(--white); font-size: 15px; border: 1px solid #eee; }

        /* Profile UI */
        .card { background: white; padding: 30px; border-radius: 20px; text-align: center; margin-top: 20px; }
        .p-img { width: 90px; height: 90px; border-radius: 50%; background: var(--soft-orange); margin: 0 auto 15px; font-size: 2.5rem; color: white; display: flex; align-items: center; justify-content: center; }

        /* Floating Input */
        .input-box { background: var(--white); padding: 12px; display: flex; gap: 10px; border-top: 1px solid #eee; position: fixed; bottom: 65px; width: 100%; box-sizing: border-box; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        
        /* Bottom Nav Bar */
        nav { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); height: 65px; display: flex; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #eee; }
        .nav-btn { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; transition: 0.2s; }
        .nav-btn.active { color: var(--soft-orange); }
        .nav-btn span { font-size: 1.3rem; }
        .nav-btn label { font-size: 10px; font-weight: bold; margin-top: 2px; }

        /* Video Call */
        #video-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        .hangup { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: #ff3b30; color: white; padding: 15px 40px; border-radius: 30px; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <span>Relay</span>
        <button onclick="startCall()" style="background:rgba(255,255,255,0.2); border:none; color:white; padding: 8px 16px; border-radius: 20px; font-size: 12px;">📞 CALL</button>
    </header>

    <div id="video-view"><button class="hangup" onclick="location.reload()">End Call</button></div>

    <div id="scr-chat" class="screen active">
        <div id="chat-list">
            <div class="msg-row">
                <div class="avatar" style="background:var(--soft-orange)"></div>
                <div class="msg-bubble">Welcome! Tabs are now fixed. Try clicking Account below.</div>
            </div>
        </div>
    </div>

    <div id="scr-calls" class="screen">
        <h3 style="color:#555">Call History</h3>
        <p style="text-align:center; color:#999; margin-top:40px;">Your call logs will appear here.</p>
    </div>

    <div id="scr-account" class="screen">
        <div class="card">
            <div class="p-img">👤</div>
            <h2 style="margin:0">Ikah</h2>
            <p style="color:#888">Relay Super App User</p>
            <button style="margin-top:20px; width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; background:#f9f9f9;">Settings</button>
        </div>
    </div>

    <div class="input-box" id="bottom-input">
        <input type="text" id="msg-in" placeholder="Message...">
        <button id="send-go" style="border:none; background:var(--soft-orange); color:white; width:45px; height:45px; border-radius:50%;">➤</button>
    </div>

    <nav>
        <button class="nav-btn active" id="btn-chat" onclick="changeTab('scr-chat', 'btn-chat')"><span>💬</span><label>Chat</label></button>
        <button class="nav-btn" id="btn-calls" onclick="changeTab('scr-calls', 'btn-calls')"><span>📞</span><label>Calls</label></button>
        <button class="nav-btn" id="btn-account" onclick="changeTab('scr-account', 'btn-account')"><span>👤</span><label>Account</label></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDC1a-bGXLrA8SqWPE4LTGlNNWb9PXql04",
            authDomain: "gen-lang-client-0720380653.firebaseapp.com",
            databaseURL: "https://gen-lang-client-0720380653-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "gen-lang-client-0720380653",
            storageBucket: "gen-lang-client-0720380653.firebasestorage.app",
            messagingSenderId: "128069738880",
            appId: "1:128069738880:web:60a8f36bf359ebf9e06165"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");

        // --- THE TAB FIX ---
        window.changeTab = (screenId, btnId) => {
            // Hide everything
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            // Show target
            document.getElementById(screenId).classList.add('active');
            document.getElementById(btnId).classList.add('active');
            
            // Toggle input bar
            document.getElementById('bottom-input').style.display = (screenId === 'scr-chat') ? 'flex' : 'none';
        };

        // --- CHAT LOGIC ---
        document.getElementById('send-go').onclick = () => {
            const m = document.getElementById('msg-in').value;
            if(m) { push(chatRef, { text: m }); document.getElementById('msg-in').value = ""; }
        };

        onChildAdded(chatRef, (data) => {
            const div = document.createElement('div');
            div.className = 'msg-row';
            div.innerHTML = `<div class="avatar"></div><div class="msg-bubble">${data.val().text}</div>`;
            document.getElementById('chat-list').appendChild(div);
            document.getElementById('scr-chat').scrollTop = document.getElementById('scr-chat').scrollHeight;
        });

        // --- VIDEO LOGIC ---
        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        window.startCall = async () => {
            document.getElementById('video-view').style.display = "block";
            await client.join("cf58cde3ad4b45b29b65dc4e01b92ae1", "relay-room", null);
            const localVideo = await AgoraRTC.createCameraVideoTrack();
            localVideo.play('video-view');
            await client.publish([localVideo]);
        };
    </script>
</body>
</html>
