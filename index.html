<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relay Messaging</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#ececec;overflow:hidden;}

.app{display:flex;height:100vh;width:100%;}

/* SIDEBAR */
.sidebar{
width:80px;background:#f6f6f6;border-right:1px solid #ddd;
display:flex;flex-direction:column;align-items:center;padding-top:15px;gap:15px;
}

.side-btn{
width:55px;height:55px;border-radius:18px;
display:flex;align-items:center;justify-content:center;
cursor:pointer;color:#666;transition:.2s;
}

.side-btn:hover{background:#ffb36b;color:#fff;}
.side-btn.active{background:#ff8c2f;color:#fff;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;position:relative;}

/* HEADER */
.header{
height:75px;background:#f8f8f8;border-bottom:1px solid #ddd;
display:flex;align-items:center;justify-content:space-between;padding:0 15px;
}

.logo{
width:50px;height:50px;border-radius:18px;background:#ff8c2f;
display:flex;align-items:center;justify-content:center;
color:#fff;cursor:pointer;
}

.search{
display:flex;align-items:center;background:#eee;
padding:8px 12px;border-radius:18px;width:200px;
}

.search input{
border:none;background:transparent;outline:none;width:100%;
}

.icon-btn{
width:42px;height:42px;border-radius:14px;
display:flex;align-items:center;justify-content:center;
background:#eee;cursor:pointer;
}

/* CHAT */
.chat-area{flex:1;overflow:auto;padding:10px;}

.chat{
background:#fff;padding:14px;border-radius:18px;
display:flex;justify-content:space-between;margin-bottom:10px;
}

.avatar{
width:45px;height:45px;border-radius:15px;
background:#ffb36b;display:flex;align-items:center;justify-content:center;
color:#fff;font-weight:bold;
}

/* FAB */
.fab{
position:absolute;right:20px;bottom:90px;
width:60px;height:60px;border-radius:20px;
background:#ff8c2f;color:#fff;
display:flex;align-items:center;justify-content:center;
cursor:pointer;
}

/* BOTTOM */
.bottom{
position:absolute;bottom:0;width:100%;height:70px;
background:#f8f8f8;border-top:1px solid #ddd;
display:flex;align-items:center;justify-content:center;
}

.dock{
display:flex;gap:25px;background:#fff;
padding:10px 20px;border-radius:25px;
}

.dock div{cursor:pointer;text-align:center;font-size:12px;}

/* MENU */
.menu{
position:absolute;right:10px;top:75px;
width:260px;background:#fff;border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
display:none;padding:10px;
}

.menu.active{display:block;}

.menu div{
padding:10px;border-bottom:1px solid #eee;
cursor:pointer;font-size:14px;
}

/* CAMERA */
#cameraBox{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
width:300px;border-radius:15px;
display:none;z-index:999;
}

video{width:100%;border-radius:15px;}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="side-btn active" onclick="go('Home')"><span class="material-icons-round">home</span></div>
<div class="side-btn" onclick="go('Work')"><span class="material-icons-round">work</span></div>
<div class="side-btn" onclick="go('Team')"><span class="material-icons-round">groups</span></div>
<div class="side-btn" onclick="go('SMS')"><span class="material-icons-round">sms</span></div>

</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="header">

<div class="logo" onclick="openCamera()">
<span class="material-icons-round">camera_alt</span>
</div>

<div class="search">
<span class="material-icons-round">search</span>
<input id="search" onkeyup="searchChat()" placeholder="Search...">
</div>

<div class="icon-btn" onclick="toggleMenu()">
<span class="material-icons-round">more_vert</span>
</div>

</div>

<!-- MENU -->
<div class="menu" id="menu">
<div onclick="go('Profile')">Profile</div>
<div onclick="go('Settings')">Settings</div>
<div onclick="go('Security')">Security</div>
<div onclick="go('Help')">Help</div>
</div>

<!-- CHAT -->
<div class="chat-area" id="chatArea">

<div class="chat"><div class="avatar">A</div><div>Alex</div></div>
<div class="chat"><div class="avatar">J</div><div>Jessica</div></div>
<div class="chat"><div class="avatar">R</div><div>Ryan</div></div>

</div>

<!-- FAB -->
<div class="fab" onclick="newChat()">
<span class="material-icons-round">add</span>
</div>

<!-- BOTTOM -->
<div class="bottom">

<div class="dock">
<div onclick="go('Chats')">Chats</div>
<div onclick="go('Contacts')">Contacts</div>
<div onclick="go('Calls')">Calls</div>
<div onclick="go('AI')">AI</div>
</div>

</div>

</div>
</div>

<!-- CAMERA -->
<div id="cameraBox">
<video id="video" autoplay></video>
</div>

<script>

function go(x){
alert(x + " clicked");
}

/* MENU */
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

/* SEARCH */
function searchChat(){
let val=document.getElementById("search").value.toLowerCase();
let chats=document.querySelectorAll(".chat");

chats.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?"flex":"none";
});
}

/* NEW CHAT */
function newChat(){
let name=prompt("New chat name:");
if(!name) return;

let div=document.createElement("div");
div.className="chat";
div.innerHTML=`<div class="avatar">${name[0]}</div><div>${name}</div>`;
document.getElementById("chatArea").prepend(div);
}

/* CAMERA FIXED */
async function openCamera(){
try{

let stream=await navigator.mediaDevices.getUserMedia({video:true});

let video=document.getElementById("video");
let box=document.getElementById("cameraBox");

video.srcObject=stream;
box.style.display="block";

}catch(e){
alert("Camera blocked or not supported");
}
}

/* CLOSE CAMERA ON CLICK */
document.getElementById("cameraBox").onclick=function(){
this.style.display="none";
}

</script>

</body>
</html>
