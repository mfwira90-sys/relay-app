<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relay Super App | Pro v4.0</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --orange: #FF9800; --grey: #F2F4F7; --white: #ffffff;
            --header-h: 60px; --dock-h: 75px; --side-w: 65px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: var(--grey); height: 100vh; display: flex; overflow: hidden; }

        /* --- SIDEBAR (Fixed & Touchable) --- */
        .sidebar { width: var(--side-w); background: var(--white); border-right: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px; z-index: 1000; }
        .s-btn { color: #888; cursor: pointer; pointer-events: auto; }

        /* --- MAIN CONTENT AREA --- */
        .app-container { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }

        header { height: var(--header-h); background: var(--orange); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 800; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; cursor: pointer; pointer-events: auto; }

        /* --- VIEWS --- */
        .viewport { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 180px; position: relative; z-index: 100; }
        .page { display: none; flex-direction: column; gap: 15px; }
        .page.active { display: flex; }

        /* --- UI CARDS --- */
        .card { background: white; padding: 20px; border-radius: 18px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; cursor: pointer; pointer-events: auto; }
        .c-icon { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; }

        /* --- FIXED OVERLAYS --- */
        .fab { position: fixed; bottom: 155px; right: 20px; width: 60px; height: 60px; background: var(--orange); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255,152,0,0.4); z-index: 1500; cursor: pointer; pointer-events: auto; }

        /* --- macOS DOCK (REBUILT) --- */
        .mac-dock { position: fixed; bottom: 15px; left: 55%; transform: translateX(-50%); background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); padding: 10px 20px; border-radius: 30px; display: flex; gap: 15px; border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 2000; }
        .d-item { display: flex; flex-direction: column; align-items: center; color: #777; border: none; background: none; min-width: 55px; cursor: pointer; pointer-events: auto; }
        .d-item.active { color: var(--orange); }
        .d-item label { font-size: 8px; font-weight: 800; margin-top: 4px; }

        /* --- DROPDOWN MENU --- */
        #menu-ui { display: none; position: absolute; top: 65px; right: 10px; background: white; border-radius: 12px; width: 180px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); z-index: 3000; overflow: hidden; }
        .m-row { padding: 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f5f5f5; cursor: pointer; font-size: 13px; }

        #cam-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <i data-lucide="layout-grid" class="s-btn" onclick="alert('Grid View')"></i>
        <i data-lucide="home" class="s-btn" onclick="showPage('home-page', 'd-home')"></i>
        <i data-lucide="briefcase" class="s-btn"></i>
        <i data-lucide="mail" class="s-btn"></i>
    </div>

    <div class="app-container">
        <header>
            <div class="brand" onclick="openRelay()">
                <i data-lucide="aperture" size="24"></i>
                <span>RELAY v4.0</span>
            </div>
            <div style="display:flex; gap:15px;">
                <i data-lucide="search" size="20" onclick="alert('Search Active')" style="cursor:pointer; pointer-events:auto;"></i>
                <i data-lucide="more-vertical" size="22" onclick="toggleMenu()" style="cursor:pointer; pointer-events:auto;"></i>
            </div>
        </header>

        <div id="menu-ui">
            <div class="m-row"><i data-lucide="user" size="14"></i> Profile</div>
            <div class="m-row"><i data-lucide="settings" size="14"></i> Settings</div>
        </div>

        <div class="viewport">
            <div id="home-page" class="page active">
                <h2 style="margin-bottom:10px;">Good Morning</h2>
                <div class="card" onclick="showPage('chat-page', 'd-chat')">
                    <div class="c-icon" style="background:var(--orange)"><i data-lucide="message-square"></i></div>
                    <div><strong>Messages</strong><p style="font-size:12px;color:#888">Continue chatting</p></div>
                </div>
                <div class="card" onclick="showPage('call-page', 'd-call')">
                    <div class="c-icon" style="background:#4CAF50"><i data-lucide="phone"></i></div>
                    <div><strong>Calls & Video</strong><p style="font-size:12px;color:#888">Connect now</p></div>
                </div>
                <div class="card">
                    <div class="c-icon" style="background:#2196F3"><i data-lucide="globe"></i></div>
                    <div><strong>AI Search</strong><p style="font-size:12px;color:#888">Powered by Relay</p></div>
                </div>
            </div>

            <div id="chat-page" class="page">
                <div style="background:white; padding:15px; border-radius:15px;">Chat Interface Loaded. Type below.</div>
            </div>

            <div id="call-page" class="page">
                <div style="background:white; padding:15px; border-radius:15px;">Recent Calls Empty.</div>
            </div>
        </div>

        <div class="fab" onclick="alert('New Chat Started')"><i data-lucide="plus" size="30"></i></div>

        <nav class="mac-dock">
            <button class="d-item active" id="d-home" onclick="showPage('home-page', 'd-home')">
                <i data-lucide="home"></i><label>HOME</label>
            </button>
            <button class="d-item" id="d-chat" onclick="showPage('chat-page', 'd-chat')">
                <i data-lucide="message-square"></i><label>CHAT</label>
            </button>
            <button class="d-item" id="d-call" onclick="showPage('call-page', 'd-call')">
                <i data-lucide="phone"></i><label>CALLS</label>
            </button>
            <button class="d-item"><i data-lucide="sparkles"></i><label>AI SEARCH</label></button>
        </nav>
    </div>

    <div id="cam-layer" style="display:none">
        <h2>Camera Access Error</h2>
        <p>Ensure permissions are granted.</p>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 30px; border-radius:20px; border:none; background:red; color:white;">EXIT</button>
    </div>

    <script>
        lucide.createIcons();

        // 1. Navigation Controller
        window.showPage = (pId, dId) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.d-item').forEach(d => d.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
            document.getElementById(dId).classList.add('active');
        };

        // 2. Header Actions
        window.toggleMenu = () => {
            const m = document.getElementById('menu-ui');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        };

        window.openRelay = () => {
            document.getElementById('cam-layer').style.display = 'flex';
        };
    </script>
</body>
</html>
