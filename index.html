<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relay Super App | Master Build</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --orange: #FF9800; --grey: #F2F4F7; --white: #ffffff;
            --sms: #4CAF50; --email: #FFD54F; --side-w: 65px;
        }

        /* --- 1. CORE ARCHITECTURE (The "Touch" Fix) --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: var(--grey); height: 100vh; overflow: hidden; display: flex; }

        /* SIDEBAR: Forced to front */
        .sidebar { width: var(--side-w); background: var(--white); border-right: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px; z-index: 5000; position: relative; }
        .s-btn { color: #888; cursor: pointer; pointer-events: auto !important; }
        .s-btn.active { color: var(--orange); }

        .stage { flex: 1; display: flex; flex-direction: column; position: relative; height: 100vh; }

        /* HEADER: Isolated Layer */
        header { height: 60px; background: var(--orange); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 4000; position: relative; }
        .logo-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; pointer-events: auto !important; z-index: 4100; }

        /* VIEWPORT: Content goes here */
        .viewport { flex: 1; overflow-y: auto; position: relative; z-index: 100; padding-bottom: 180px; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }

        /* --- 2. MENU & OVERLAYS --- */
        #mega-menu { display: none; position: absolute; top: 65px; right: 10px; background: white; width: 260px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 6000; border: 1px solid #eee; overflow: hidden; }
        .menu-row { padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid #f5f5f5; pointer-events: auto !important; }
        .m-title { background: #f9f9f9; padding: 8px 15px; font-size: 10px; font-weight: 900; color: #999; }

        /* FAB: Floating high above everything */
        .fab-btn { position: fixed; bottom: 155px; right: 20px; width: 62px; height: 62px; background: var(--orange); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(255,152,0,0.5); z-index: 7000; cursor: pointer; pointer-events: auto !important; }

        /* macOS DOCK */
        .dock-wrap { position: fixed; bottom: 15px; left: 58%; transform: translateX(-50%); z-index: 8000; pointer-events: auto !important; }
        .dock { background: rgba(255,255,255,0.92); backdrop-filter: blur(15px); padding: 10px 22px; border-radius: 35px; display: flex; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 1px solid rgba(0,0,0,0.1); }
        .d-icon { display: flex; flex-direction: column; align-items: center; color: #777; border: none; background: none; min-width: 55px; cursor: pointer; }
        .d-icon.active { color: var(--orange); }
        .d-icon label { font-size: 8px; font-weight: 800; margin-top: 4px; }

        /* --- 3. CHAT FEATURES --- */
        .tab-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 8px 16px; border-radius: 20px; font-size: 11px; font-weight: 800; }
        .t-relay { background: #FFF3E0; color: var(--orange); border: 1.5px solid var(--orange); }
        .t-sms { background: #E8F5E9; color: var(--sms); }
        .t-email { background: #FFFDE7; color: var(--email); }

        .chat-card { background: white; padding: 18px; border-radius: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; position: relative; border: 1px solid #eee; pointer-events: auto !important; overflow: hidden; transition: 0.2s; }
        .chat-card:active { transform: scale(0.98); background: #fafafa; }

        /* --- 4. FULLSCREEN CAMERA --- */
        #cam-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .snap-btn { width: 75px; height: 75px; border-radius: 50%; border: 5px solid white; background: transparent; cursor: pointer; margin-top: 40px; pointer-events: auto !important; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <i data-lucide="home" class="s-btn active" onclick="go('p-home', 'd-home')"></i>
        <i data-lucide="briefcase" class="s-btn" onclick="alert('Work Category')"></i>
        <i data-lucide="users" class="s-btn" onclick="alert('Team View')"></i>
        <i data-lucide="mail" class="s-btn" onclick="alert('Email Scoped')"></i>
    </nav>

    <div class="stage">
        <header>
            <div class="logo-trigger" onclick="openCameraApp()">
                <i data-lucide="aperture" size="28"></i>
                <span style="font-weight:900; letter-spacing:1px;">RELAY</span>
            </div>
            <div style="display:flex; gap:15px; align-items:center;">
                <i data-lucide="search" size="20" onclick="alert('Search Chats...')"></i>
                <i data-lucide="more-vertical" size="24" onclick="toggleMenu()" style="cursor:pointer"></i>
            </div>
        </header>

        <div id="mega-menu">
            <div class="m-title">PROFILE</div>
            <div class="menu-row" onclick="alert('Open Profile Edit')"><i data-lucide="user"></i> Display & Bio</div>
            <div class="m-title">ACCOUNT</div>
            <div class="menu-row" onclick="alert('Encryption Active')"><i data-lucide="shield-check"></i> Security & P2P</div>
            <div class="m-title">SETTINGS</div>
            <div class="menu-row" onclick="alert('Theme Switched')"><i data-lucide="moon"></i> Night Mode</div>
        </div>

        <div class="viewport">
            <div id="p-home" class="page active">
                <div class="tab-box">
                    <div class="tab t-relay">RELAY</div>
                    <div class="tab t-sms">SMS</div>
                    <div class="tab t-email">EMAIL</div>
                </div>
                <div class="chat-card" oncontextmenu="pin(this); return false;" id="example-chat">
                    <div style="width:50px; height:50px; background:var(--orange); border-radius:50%; flex-shrink:0;"></div>
                    <div style="flex:1">
                        <strong style="font-size:15px;">Official Relay Team</strong>
                        <p style="font-size:12px; color:#888;">Swipe left to delete or archive...</p>
                    </div>
                    <i data-lucide="check-check" size="14" color="var(--orange)"></i>
                </div>
            </div>

            <div id="p-status" class="page"><h3>Reminders & Status</h3></div>
            <div id="p-calls" class="page"><h3>Meeting Rooms</h3></div>
            <div id="p-ai" class="page"><h3>AI Engine (20 Free)</h3></div>
        </div>

        <div class="fab-btn" onclick="alert('Opening Contact List...')"><i data-lucide="plus" size="32"></i></div>

        <div class="dock-wrap">
            <nav class="dock">
                <button class="d-icon active" id="d-home" onclick="go('p-home', 'd-home')"><i data-lucide="message-square"></i><label>Chats</label></button>
                <button class="d-icon" id="d-status" onclick="go('p-status', 'd-status')"><i data-lucide="circle-dashed"></i><label>Status</label></button>
                <button class="d-icon" id="d-calls" onclick="go('p-calls', 'd-calls')"><i data-lucide="video"></i><label>Calls</label></button>
                <button class="d-icon" id="d-ai" onclick="go('p-ai', 'd-ai')"><i data-lucide="zap"></i><label>AI</label></button>
            </nav>
        </div>
    </div>

    <div id="cam-overlay">
        <video id="vid" autoplay playsinline style="width:100%; height:75%; object-fit:cover;"></video>
        <div class="snap-btn" onclick="alert('Photo Saved!')"></div>
        <button onclick="closeCameraApp()" style="margin-top:20px; background:white; color:black; padding:10px 30px; border-radius:20px; border:none; font-weight:bold;">EXIT</button>
    </div>

    <script>
        lucide.createIcons();

        // 1. Navigation Logic
        window.go = (p, d) => {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.d-icon').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            document.getElementById(d).classList.add('active');
            document.getElementById('mega-menu').style.display = 'none';
        };

        // 2. Camera Functions
        let streamObj = null;
        window.openCameraApp = async () => {
            document.getElementById('cam-overlay').style.display = 'flex';
            try {
                streamObj = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('vid').srcObject = streamObj;
            } catch (err) { alert("Camera error: " + err); }
        };
        window.closeCameraApp = () => {
            if(streamObj) streamObj.getTracks().forEach(t => t.stop());
            document.getElementById('cam-overlay').style.display = 'none';
        };

        // 3. UI Interactions
        window.toggleMenu = () => {
            const m = document.getElementById('mega-menu');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        };

        window.pin = (el) => {
            el.style.borderLeft = "5px solid var(--orange)";
            alert("Chat Pinned!");
        };

        // 4. Swipe Logic (Simplified for Mobile)
        let touchStartX = 0;
        document.getElementById('example-chat').addEventListener('touchstart', (e) => touchStartX = e.touches[0].clientX);
        document.getElementById('example-chat').addEventListener('touchend', (e) => {
            let diff = touchStartX - e.changedTouches[0].clientX;
            if (diff > 80) alert("Chat Archived");
        });
    </script>
</body>
</html>
