<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Relay Messaging</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
:root{
  --orange:#FF8C42;
  --orange2:#FFAB76;
  --grey:#EAE4E6;
  --dark:#2b2b2b;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--grey);
  overflow:hidden;
}

/* HEADER */
.header{
  height:55px;
  background:linear-gradient(90deg,var(--orange2),var(--orange));
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10px;
  color:#fff;
}

.icon-btn{
  cursor:pointer;
  user-select:none;
}

/* LAYOUT */
.container{
  display:flex;
  height:calc(100vh - 110px);
}

/* SIDEBAR */
.sidebar{
  width:80px;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:10px;
  gap:15px;
  border-right:1px solid #ddd;
}

.side-item{
  font-size:11px;
  text-align:center;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  overflow:auto;
  padding:10px;
}

/* CHAT ITEM */
.chat{
  background:#fff;
  padding:10px;
  margin-bottom:8px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.2s;
  touch-action: pan-y;
  position:relative;
}

.chat.swipe-left{
  transform:translateX(-80px);
  background:#ffe5e5;
}

.chat-actions{
  position:absolute;
  right:-80px;
  top:0;
  height:100%;
  width:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:12px;
}

.delete{
  background:red;
}

.archive{
  background:orange;
}

/* BOTTOM NAV */
.bottom{
  height:55px;
  background:#fff;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #ddd;
}

.tab{
  text-align:center;
  font-size:11px;
  cursor:pointer;
}

/* FAB */
.fab{
  position:fixed;
  right:15px;
  bottom:70px;
  background:var(--orange);
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:30px;
  cursor:pointer;
}

/* CAMERA */
.camera{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

video{
  width:100%;
  max-height:70%;
}

.snap{
  margin-top:10px;
  background:var(--orange);
  padding:10px 20px;
  color:#fff;
  border-radius:20px;
  cursor:pointer;
}

.closeCam{
  position:absolute;
  top:10px;
  right:10px;
  color:#fff;
  cursor:pointer;
}

/* STATUS / CALLS / AI */
.page{
  display:none;
}
.page.active{
  display:block;
}

.small-note{
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div onclick="openCamera()">📷 Relay</div>

  <div style="display:flex;gap:10px;align-items:center;">
    🔍
    ☰
  </div>
</div>

<!-- MAIN -->
<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="side-item">Home</div>
    <div class="side-item">Work</div>
    <div class="side-item">Team</div>
    <div class="side-item">Friends</div>
    <div class="side-item">SMS</div>
    <div class="side-item">Email</div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- CHATS PAGE -->
    <div id="chats" class="page active">

      <input id="search" placeholder="Search chats..." oninput="filterChats()" style="width:100%;padding:8px;border-radius:10px;border:1px solid #ccc;margin-bottom:10px;">

      <div id="chatList"></div>

    </div>

    <!-- STATUS -->
    <div id="status" class="page">
      <h3>Status</h3>
      <p class="small-note">Add image, text or 10s video status</p>
    </div>

    <!-- CALLS -->
    <div id="calls" class="page">
      <h3>Calls</h3>
      <p class="small-note">Video / Voice / Meeting rooms (UI mock)</p>
    </div>

    <!-- AI -->
    <div id="ai" class="page">
      <h3>AI Search</h3>
      <p class="small-note">20 free searches/day (UI mock)</p>
    </div>

  </div>
</div>

<!-- FAB -->
<div class="fab" onclick="newChat()">+</div>

<!-- BOTTOM NAV -->
<div class="bottom">
  <div class="tab" onclick="switchPage('chats')">Chats</div>
  <div class="tab" onclick="switchPage('status')">Status</div>
  <div class="tab" onclick="switchPage('calls')">Calls</div>
  <div class="tab" onclick="switchPage('ai')">AI</div>
</div>

<!-- CAMERA -->
<div class="camera" id="camera">
  <div class="closeCam" onclick="closeCamera()">✖</div>
  <video id="video" autoplay></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <div class="snap" onclick="snap()">SNAP</div>
</div>

<script>

let chats = [
  {name:"Ali", msg:"Hello", pinned:false},
  {name:"Sara", msg:"Ok", pinned:false},
  {name:"Team Dev", msg:"Meeting at 5", pinned:false},
];

function renderChats(){
  let list = document.getElementById("chatList");
  list.innerHTML="";

  chats.forEach((c,i)=>{
    let div = document.createElement("div");
    div.className="chat";
    div.innerHTML=`
      <div>
        <b>${c.name}</b><br>
        <small>${c.msg}</small>
      </div>
      <div>✔</div>
      <div class="chat-actions delete">Delete</div>
      <div class="chat-actions archive">Archive</div>
    `;

    // SWIPE
    let startX=0;
    div.addEventListener("touchstart",(e)=>{
      startX=e.touches[0].clientX;
    });

    div.addEventListener("touchmove",(e)=>{
      let diff = e.touches[0].clientX - startX;
      if(diff < -50){
        div.classList.add("swipe-left");
      }
    });

    div.addEventListener("touchend",()=>{
      if(div.classList.contains("swipe-left")){
        chats.splice(i,1);
        renderChats();
      }
    });

    // LONG PRESS PIN
    let pressTimer;
    div.addEventListener("touchstart",()=>{
      pressTimer=setTimeout(()=>{
        chats[i].pinned=!chats[i].pinned;
        alert("Pinned toggled");
      },800);
    });
    div.addEventListener("touchend",()=>clearTimeout(pressTimer));

    list.appendChild(div);
  });
}

renderChats();

function newChat(){
  let name = prompt("New chat name:");
  if(name){
    chats.unshift({name,msg:"New chat",pinned:false});
    renderChats();
  }
}

function filterChats(){
  let val = document.getElementById("search").value.toLowerCase();
  let items=document.querySelectorAll(".chat");
  items.forEach(el=>{
    el.style.display = el.innerText.toLowerCase().includes(val)?"flex":"none";
  });
}

function switchPage(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

/* CAMERA */
let video = document.getElementById("video");

function openCamera(){
  document.getElementById("camera").style.display="flex";

  navigator.mediaDevices.getUserMedia({video:true})
  .then(stream=>{
    video.srcObject=stream;
  });
}

function closeCamera(){
  document.getElementById("camera").style.display="none";
  let stream = video.srcObject;
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
  }
}

function snap(){
  let canvas=document.getElementById("canvas");
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  let ctx=canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  let img=canvas.toDataURL("image/png");
  alert("Photo captured!");
  console.log(img);
}

</script>

</body>
</html>
