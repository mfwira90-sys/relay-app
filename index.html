<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relay Super App | Production Build</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        :root { --orange: #FF9800; --grey: #F2F4F7; --white: #ffffff; --side: 70px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; }
        body { font-family: sans-serif; background: var(--grey); height: 100vh; display: grid; grid-template-columns: var(--side) 1fr; overflow: hidden; }

        /* Sidebar - Isolated Layer */
        .sidebar { background: var(--white); border-right: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 35px; z-index: 1000; }
        .s-btn { color: #888; cursor: pointer; }

        /* Header & Content */
        .main-container { display: grid; grid-template-rows: 60px 1fr; height: 100vh; position: relative; }
        header { background: var(--orange); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 900; }
        
        .view-content { overflow-y: auto; padding-bottom: 180px; z-index: 100; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }

        /* Home Page UI */
        .card { background: white; padding: 20px; border-radius: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .icon-box { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; background: var(--orange); }

        /* Interface Overlay */
        .dock { position: fixed; bottom: 15px; left: calc(50% + 35px); transform: translateX(-50%); background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 10px 25px; border-radius: 35px; display: flex; gap: 20px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); z-index: 2000; border: 1px solid #eee; }
        .d-btn { display: flex; flex-direction: column; align-items: center; color: #999; border: none; background: none; min-width: 50px; }
        .d-btn.active { color: var(--orange); }
        .d-btn label { font-size: 9px; font-weight: 800; margin-top: 4px; }

        #cam-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <i data-lucide="home" class="s-btn"></i>
        <i data-lucide="layout-grid" class="s-btn"></i>
        <i data-lucide="users" class="s-btn"></i>
    </aside>

    <div class="main-container">
        <header><div onclick="showCam()">RELAY</div></header>
        <div class="view-content">
            <div id="home-page" class="page active">
                <h3>Welcome Home</h3>
                <div class="card" onclick="nav('chat-page', 'd-chat')">
                    <div class="icon-box"><i data-lucide="message-square"></i></div>
                    <div><strong>Messages</strong></div>
                </div>
            </div>
            <div id="chat-page" class="page">
                <div id="chat-stream">Welcome to Chat</div>
            </div>
        </div>
        <nav class="dock">
            <button class="d-btn active" id="d-home" onclick="nav('home-page', 'd-home')"><i data-lucide="home"></i><label>HOME</label></button>
            <button class="d-btn" id="d-chat" onclick="nav('chat-page', 'd-chat')"><i data-lucide="message-square"></i><label>CHATS</label></button>
        </nav>
    </div>

    <div id="cam-layer"><button onclick="location.reload()" style="position:absolute; bottom:50px; left:50%; transform:translateX(-50%); background:red; color:white; padding:15px; border-radius:30px; border:none;">EXIT</button></div>

    <script>
        lucide.createIcons();
        window.nav = (p, d) => {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.d-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            document.getElementById(d).classList.add('active');
        };
        window.showCam = () => document.getElementById('cam-layer').style.display = 'block';
    </script>
</body>
</html>
